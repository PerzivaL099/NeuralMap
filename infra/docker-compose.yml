services:
  # --------------------------------------------------------
  # THE MEMORY: Neo4j Graph Database
  # --------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: neuralmap_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_AUTH=neo4j/neuralmap_secret_123 
      - NEO4J_PLUGINS=["apoc"] 
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # --------------------------------------------------------
  # THE SENSORY STORAGE: MinIO Object Storage
  # --------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: neuralmap_minio
    restart: unless-stopped
    ports:
      - "9000:9000" 
      - "9001:9001" 
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=SuperSecretPassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --------------------------------------------------------
  # ACTIVEPIECES DATABASE: PostgreSQL
  # --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: neuralmap_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=ap_user
      - POSTGRES_PASSWORD=ap_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --------------------------------------------------------
  # ACTIVEPIECES MESSAGE BROKER: Redis
  # --------------------------------------------------------
  redis:
    image: redis:7
    container_name: neuralmap_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # --------------------------------------------------------
  # THE NERVOUS SYSTEM: Activepieces Automation
  # --------------------------------------------------------
  activepieces:
    image: activepieces/activepieces:latest
    container_name: neuralmap_activepieces
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:80" 
    environment:
      - AP_EXECUTION_MODE=UNSANDBOXED
      - AP_FRONTEND_URL=http://localhost:8081
      - AP_DB_TYPE=POSTGRES
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=ap_user
      - AP_POSTGRES_PASSWORD=ap_password
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_TELEMETRY_ENABLED=false
    volumes:
      - activepieces_data:/root/.activepieces

# --------------------------------------------------------
# PERSISTENT VOLUMES
# --------------------------------------------------------
volumes:
  neo4j_data:
  neo4j_logs:
  minio_data:
  postgres_data:
  activepieces_data: